<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

  <div class="container-md border border-secondary-subtle rounded-3 mt-3">
    <div class="h1 text-center">Create Account</div>
    <div class="text-center small text-muted mb-3">Get started with your account</div>

    <div class="text-center mb-2">
      <a class="btn btn-primary col-xl-3 col-lg-4 col-md-5 col-sm-6" href="" role="button">
        <i class="bi bi-twitter"></i>
        Login via twitter
      </a>
    </div>

    <div class="text-center mb-2 ">
      <a class="btn btn-primary col-xl-3 col-lg-4 col-md-5 col-sm-6" role="button" href="">
        <i class="bi bi-facebook"></i>
        Login via facebook
      </a>
    </div>

    <div class="text-center mb-3">
      <span>OR</span>
    </div>

    <form>
      <div class="mb-3 w-50 mx-auto input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input class="form-control" type="text" placeholder="type username">
      </div>

      <div class="mb-3 w-50 mx-auto input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></i></span>
        <input type="text" placeholder="type password">
      </div>

      <div class="text-center mb-3">
        <button class="btn btn-success">Create Account</button>
      </div>
    </form>

    <div class="text-center mb-3">
      <span>Have an Account</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
