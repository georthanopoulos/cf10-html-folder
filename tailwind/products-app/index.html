<!DOCTYPE html>
<html lang="el">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>

<body>

  <nav class="bg-blue-700 text-white">

    <!-- sxolio gia to parakatw flex=ena dipla sto allo. justbetween=to ena ar to allo deksia to allo diamoirazetai sta ypoloipa.
   items-center=katakoryfa max-w-6xl=megisto width oso thekw..oxi olo! to megisto einai 6xl!mx-auto=left right auto kai erxetai sto kentro.-->
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">

      <!-- Logo -->
      <a href="index.html" class="text-xl font-bold">MyShop</a>

      <!-- Desktop Menu -->
      <div class="hidden md:flex space-x-6">
        <a href="index.html" class="hover:text-yellow-300">Αρχική</a>
        <a href="login.html" class="hover:text-yellow-300">Σύνδεση</a>
        <a href="products.html" class="hover:text-yellow-300">Προϊόντα</a>

        <div class="group">
          <button>
            Άλλο
            <span><i class="fa-solid fa-angle-down"></i></span>
          </button>

          <!-- group-hover-block = kybei to menoy sto allo kai to emfanizei on hover. absolute=to anoigokleinei akounhta xvriw na koynietai to navbar. ektow toy navbar.to block moiazei san staueroropoihths. akribeia!-->
          <div class="absolute
        <div class=" absolute bg-white text-black rounded shadow-lg hidden group-hover:block w-40 z-50">
            <a href="#" class="block px-4 py-2 hover:bg-gray-200">Πληροφορίες</a>
            <a href="#" class="block px-4 py-2 hover:bg-gray-200">Επικοινωνία</a>
          </div>
        </div>
      </div>

      <!-- Mobile Hamburger Hamburger - an bazame icon apo to font awesome eprepe na mpei mesa se span giati uevreitai keimeno. ayto einai etoimo apo to site poy to peiraes se svg anti gia span . apo heroicons.com -->
      <button id="menuBtn" class="md:hidden text-3xl">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="size-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
      </button>
    </div>


    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden md:hidden bg-blue-600 px-4 pb-4 space-y-2">
      <a href="index.html" class="block hover:text-yellow-300">Αρχική</a>
      <a href="login.html" class="block hover:text-yellow-300">Σύνδεση</a>
      <a href="products.html" class="block hover:text-yellow-300">Προϊόντα</a>

      <div>
        <button onclick="toggleMobileDropdown()">
          Άλλο
          <span>▼</span>
        </button>

        <div id="mobileDropdown" class="hidden ml-4 mt-2 space-y-1">
          <a href="#" class="block hover:text-yellow-300">Πληροφορίες</a>
          <a href="#" class="block hover:text-yellow-300">Επικοινωνία</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Carousel -->
  <div class="relative w-full overflow-hidden">
    <div id="carousel" class="whitespace-nowrap">
      <img class="inline-block w-full" src="https://picsum.photos/1200/400?1">
      <img class="inline-block w-full" src="https://picsum.photos/1200/400?2">
    </div>

    <button onclick="prevSlide()" class="absolute left-4 top-1/2 bg-white p-2 rounded-full shadow">‹</button>
    <button onclick="nextSlide()" class="absolute right-4 top-1/2 bg-white p-2 rounded-full shadow">›</button>
  </div>

  <!-- Collapse -->
  <div class="max-w-4xl mx-auto text-center mt-10">
    <button onclick="toggleInfo()" class="bg-gray-700 text-white px-4 py-2 rounded">
      Περισσότερα
    </button>

    <div id="infoBox" class="hidden mt-4 bg-gray-400 p-4 shadow rounded">
      Εδώ μπορείτε να βρείτε πληροφορίες για το κατάστημα.
    </div>
  </div>

  <!-- Tootip -->
  <div class="max-w-4xl mx-auto mt-10 text-center">
    <button class="group">
      Hover me
      <span class="hidden group-hover:block">
        Tooltip!
      </span>
    </button>
  </div>

  <footer class="bg-gray-800 text-white text-center py-4 mt-10">
    © 2026 MyShop — All rights reserved
  </footer>

  <script>
    document.getElementById("menuBtn").onclick = () => {
      document.getElementById("mobileMenu").classList.toggle("hidden");
    }

    function toggleMobileDropdown() {
      document.getElementById('mobileDropdown').classList.toggle("hidden");
    }
  </script>
  <script>
    let index = 0;
    function showSlide() {
      document.getElementById("carousel").style.transform = `translateX(-${index * 100}%)`;
    }
    function nextSlide() {
      index = (index + 1) % 2;
      showSlide();
    }

    function prevSlide() {
      index = (index - 1 + 2) % 2;
      showSlide();
    }

    function toggleInfo() {
      document.getElementById("infoBox").classList.toggle('hidden')
    }
  </script>
</body>

</html>
